<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144" role="img" aria-labelledby="title desc">
  <title id="title">Myeongin Electronics logo</title>
  <desc id="desc">A clean blue circular mark with a stylized M and cool air lines.</desc>
  <defs>
    <linearGradient id="markBg" x1="26" y1="20" x2="118" y2="124" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D8BD8"/>
      <stop offset=".52" stop-color="#075C9D"/>
      <stop offset="1" stop-color="#06385F"/>
    </linearGradient>
    <linearGradient id="iceLine" x1="43" y1="40" x2="108" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#B9ECFF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#06385F" flood-opacity=".22"/>
    </filter>
  </defs>

  <circle cx="72" cy="72" r="56" fill="url(#markBg)" filter="url(#softShadow)"/>
  <circle cx="72" cy="72" r="48" fill="none" stroke="#FFFFFF" stroke-opacity=".22" stroke-width="2"/>

