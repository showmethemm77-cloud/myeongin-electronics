  <path d="M37 101h47" stroke="#BFEFFF" stroke-width="7" stroke-linecap="round"/>
  <path d="M95 101h12" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
  <path d="M48 116c14 7 33 7 48 0" stroke="#BFEFFF" stroke-width="6" stroke-linecap="round" opacity=".95"/>

  <path d="M105 34l3 8 8 3-8 3-3 8-3-8-8-3 8-3 3-8Z" fill="#D7F7FF" opacity=".9"/>
