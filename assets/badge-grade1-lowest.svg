<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 104" role="img" aria-label="에너지 1등급 최저가">
  <defs>
    <linearGradient id="badge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e8172b"/>
      <stop offset="1" stop-color="#ff5a18"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#9b1020" flood-opacity=".28"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="8" y="8" width="304" height="88" rx="44" fill="url(#badge)"/>
    <circle cx="58" cy="52" r="34" fill="#fff"/>
    <text x="58" y="45" text-anchor="middle" fill="#e8172b" font-family="Arial, sans-serif" font-size="14" font-weight="700">에너지</text>
    <text x="58" y="70" text-anchor="middle" fill="#e8172b" font-family="Arial, sans-serif" font-size="28" font-weight="900">1</text>
    <text x="96" y="45" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="700">1등급 상품</text>
    <text x="96" y="73" fill="#fff" font-family="Arial, sans-serif" font-size="25" font-weight="900">온라인 최저가</text>
  </g>
</svg>
