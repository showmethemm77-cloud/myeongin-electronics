<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">명인전자 메인 에어컨 설치 이미지</title>
  <desc id="desc">밝은 거실과 사무공간 분위기에 스탠드형 에어컨과 벽걸이형 에어컨이 설치된 메인 배너 이미지</desc>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f7fbff"/>
      <stop offset=".55" stop-color="#e9f2f8"/>
      <stop offset="1" stop-color="#fff"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1=".25" x2="1" y2="1">
      <stop stop-color="#d8b98f"/>
      <stop offset=".55" stop-color="#ecd8bb"/>
      <stop offset="1" stop-color="#bd9368"/>
    </linearGradient>
    <linearGradient id="stand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset=".55" stop-color="#edf4f8"/>
      <stop offset="1" stop-color="#cbd9e3"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#122033" flood-opacity=".18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#wall)"/>
  <path d="M0 545h1440v355H0z" fill="url(#floor)"/>
  <path d="M0 590h1440" stroke="#fff" stroke-opacity=".65" stroke-width="3"/>

  <g opacity=".42">
    <path d="M62 856 535 546M215 900 695 546M390 900 870 546M567 900 1046 546M745 900 1225 546M924 900 1400 546" stroke="#a97e55" stroke-width="3"/>
    <path d="M0 718h1440M0 790h1440M0 860h1440" stroke="#f5e5cd" stroke-width="3"/>
  </g>

  <g transform="translate(860 92)">
    <rect width="330" height="298" rx="8" fill="#dcebf4"/>
    <rect x="20" y="18" width="290" height="260" fill="#f9fdff"/>
    <path d="M20 82h290M20 148h290M20 214h290M90 18v260M162 18v260M236 18v260" stroke="#d8e4ec" stroke-width="3"/>
    <path d="M0 0h330v298H0z" fill="#fff" opacity=".22"/>
  </g>

  <g transform="translate(115 380)" filter="url(#shadow)">
    <rect x="0" y="64" width="442" height="122" rx="32" fill="#d8e1e8"/>
    <rect x="34" y="24" width="378" height="96" rx="28" fill="#f5f8fa"/>
