    <path d="M5 74c82-32 196-34 312 14" fill="none" stroke="#51aee8" stroke-width="8" stroke-linecap="round" opacity=".18"/>
    <path d="M62 126c72-21 159-15 236 24" fill="none" stroke="#51aee8" stroke-width="8" stroke-linecap="round" opacity=".16"/>
