    <rect x="34" y="55" width="350" height="9" rx="4.5" fill="#aab8c5"/>
    <circle cx="364" cy="34" r="10" fill="#88a8bb"/>
    <path d="M40 25h226" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity=".74"/>
  </g>

  <g transform="translate(1012 330)" filter="url(#shadow)">
    <ellipse cx="122" cy="442" rx="136" ry="28" fill="#172230" opacity=".16" filter="url(#soft)"/>
