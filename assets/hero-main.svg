    <rect x="28" y="35" width="194" height="16" rx="8" fill="#d9e7ef"/>
    <rect x="28" y="68" width="150" height="12" rx="6" fill="#e8f0f5"/>
    <rect x="195" y="64" width="28" height="22" rx="8" fill="#0b77c5" opacity=".78"/>
