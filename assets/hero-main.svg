    <circle cx="352" cy="202" r="23" fill="#9aa8b5"/>
    <path d="M58 108h320" stroke="#b7c5cf" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g transform="translate(160 186)" filter="url(#shadow)">
